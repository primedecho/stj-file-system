name: stj-file-system

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Keep Docker-specific DB path; .env uses a local SQLite path.
      DATABASE_URL: sqlite:////app/data/stj_file_system.db
    volumes:
      - backend-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
